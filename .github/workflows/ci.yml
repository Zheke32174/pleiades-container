name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install verification tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck systemd-container
      - name: Check repository invariants
        run: bash ci/check.sh
      - name: ShellCheck warnings
        run: find . -type f -name '*.sh' -not -path './.git/*' -exec shellcheck --severity=warning {} + 2>&1 || true
