name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Install verification tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck systemd-container

      - name: Check repository invariants
        run: bash ci/check.sh

      - name: Capture deterministic bootstrap diagnostics
        id: bootstrap
        shell: bash
        run: |
          set +e
          bash -n bootstrap-container.sh tests/test-bootstrap-container.sh > parse.log 2>&1
          parse_status=$?
          shellcheck -f gcc bootstrap-container.sh tests/test-bootstrap-container.sh > shellcheck.log 2>&1
          lint_status=$?
          bash tests/test-bootstrap-container.sh > bootstrap-tests.log 2>&1
          test_status=$?
          echo "parse_status=$parse_status" >> "$GITHUB_OUTPUT"
          echo "lint_status=$lint_status" >> "$GITHUB_OUTPUT"
          echo "test_status=$test_status" >> "$GITHUB_OUTPUT"
          cat parse.log shellcheck.log bootstrap-tests.log
          exit 0

      - name: Preserve complete diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-validation-${{ github.sha }}
          path: |
            parse.log
            shellcheck.log
            bootstrap-tests.log
          if-no-files-found: error
          retention-days: 14

      - name: Enforce bootstrap gate
        if: always()
        run: |
          test "${{ steps.bootstrap.outputs.parse_status }}" = "0"
          test "${{ steps.bootstrap.outputs.lint_status }}" = "0"
          test "${{ steps.bootstrap.outputs.test_status }}" = "0"
