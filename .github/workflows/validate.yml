name: Validate container substrate

on:
  push:
  pull_request:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-and-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all shell scripts
        run: |
          set -euo pipefail
          while IFS= read -r script; do
            bash -n "$script"
          done < <(find . -type f -name '*.sh' -not -path './.git/*' | sort)
      - name: Verify bootstrap command-line contract
        run: |
          set -euo pipefail
          bash bootstrap-container.sh --help >/dev/null
          PLEIADES_REPO=https://example.invalid/pleiades.git \
            bash bootstrap-container.sh --dry-run --root /tmp/pleiades-ci-a >/tmp/dry-a.log
          PLEIADES_REPO=https://example.invalid/pleiades.git \
            bash bootstrap-container.sh --root /tmp/pleiades-ci-b --dry-run >/tmp/dry-b.log
          grep -F '[DRY-RUN]' /tmp/dry-a.log >/dev/null
          grep -F '/tmp/pleiades-ci-b' /tmp/dry-b.log >/dev/null
          if bash bootstrap-container.sh --root >/tmp/missing-root.log 2>&1; then
            echo 'bootstrap unexpectedly accepted --root without a path' >&2
            exit 1
          fi
          if bash bootstrap-container.sh --definitely-unknown >/tmp/unknown.log 2>&1; then
            echo 'bootstrap unexpectedly accepted an unknown option' >&2
            exit 1
          fi
      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: Capture ShellCheck report
        id: shellcheck
        shell: bash
        run: |
          set +e
          find . -type f -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning \
            > shellcheck.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat shellcheck.log
          exit 0
      - name: Upload ShellCheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-shellcheck-${{ github.sha }}
          path: shellcheck.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce ShellCheck result
        if: always()
        run: exit "${{ steps.shellcheck.outputs.exit_code }}"

  systemd-units:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture Pleiades-owned systemd verification report
        id: systemd
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          units=(
            systemd/system/pleiades*.service
            systemd/system/host-bridge-monitor.service
            systemd/system/windows-host-bridge-monitor.service
            systemd/system/pleiades.target
            gentoo-nspawn.service
            gentoo-pleiades-bridge.service
          )
          (( ${#units[@]} > 0 )) || {
            echo 'No Pleiades-owned units found.' >&2
            exit 1
          }

          created_paths="$(mktemp)"
          cleanup() {
            while IFS= read -r path; do
              [[ -n "$path" ]] && sudo rm -f "$path"
            done < "$created_paths"
            rm -f "$created_paths"
          }
          trap cleanup EXIT

          python3 - "${units[@]}" <<'PY' > /tmp/pleiades-exec-paths
          import shlex
          import sys
          from pathlib import Path

          directives = ("ExecStart=", "ExecStartPre=", "ExecStartPost=", "ExecStop=", "ExecStopPost=")
          paths = set()
          for name in sys.argv[1:]:
              for raw in Path(name).read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line.startswith(directives):
                      continue
                  value = line.split("=", 1)[1].lstrip("-+!:@").strip()
                  if not value:
                      continue
                  try:
                      executable = shlex.split(value, posix=True)[0]
                  except (ValueError, IndexError):
                      continue
                  if executable.startswith("/") and "%" not in executable:
                      paths.add(executable)
          for executable in sorted(paths):
              print(executable)
          PY

          while IFS= read -r executable; do
            [[ -n "$executable" ]] || continue
            if [[ ! -e "$executable" ]]; then
              sudo mkdir -p "$(dirname "$executable")"
              printf '#!/bin/sh\nexit 0\n' | sudo tee "$executable" >/dev/null
              sudo chmod 0755 "$executable"
              printf '%s\n' "$executable" >> "$created_paths"
            fi
          done < /tmp/pleiades-exec-paths

          export SYSTEMD_UNIT_PATH="$PWD/systemd/system:$PWD:/etc/systemd/system:/usr/lib/systemd/system:/lib/systemd/system"
          set +e
          systemd-analyze verify "${units[@]}" > systemd-verify.log 2>&1
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          cat systemd-verify.log
      - name: Upload systemd verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-systemd-verify-${{ github.sha }}
          path: systemd-verify.log
          if-no-files-found: error
          retention-days: 14
      - name: Enforce systemd verification result
        if: always()
        run: exit "${{ steps.systemd.outputs.exit_code }}"
