name: Validate container bootstrap

on:
  push:
    paths:
      - bootstrap-container.sh
      - tests/test-bootstrap-container.sh
      - .github/workflows/validate-bootstrap.yml
  pull_request:
    paths:
      - bootstrap-container.sh
      - tests/test-bootstrap-container.sh
      - .github/workflows/validate-bootstrap.yml

permissions:
  contents: read

jobs:
  deterministic-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Parse
        run: bash -n bootstrap-container.sh && bash -n tests/test-bootstrap-container.sh

      - name: Capture ShellCheck diagnostics
        id: lint
        shell: bash
        run: |
          set +e
          shellcheck -f gcc bootstrap-container.sh tests/test-bootstrap-container.sh > shellcheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat shellcheck.log
          exit 0

      - name: Capture deterministic safety tests
        id: tests
        shell: bash
        run: |
          set +e
          bash tests/test-bootstrap-container.sh > bootstrap-tests.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat bootstrap-tests.log
          exit 0

      - name: Preserve diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-validation-diagnostics
          path: |
            shellcheck.log
            bootstrap-tests.log
          if-no-files-found: error
          retention-days: 14

      - name: Enforce validation gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.lint.outputs.status }}" = "0"
          test "${{ steps.tests.outputs.status }}" = "0"
